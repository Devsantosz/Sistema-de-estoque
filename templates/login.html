<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../src/static/armazem.ico" type="image/x-icon">
    <title>Tela de login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            background-image: url(../static/estoque.jpg);
            box-shadow: inset -100px 0px 1000px rgba(0, 0, 0, 0.678);
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        main{
            display: grid;
            grid-template-columns: auto 1fr auto;
            justify-items: center;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-card {
            grid-column: 2;
            background-color: rgba(255, 255, 255, 0.459);
            padding: 20px;
            border: 1px solid #00000033;
            border-radius: 5px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.959);
            
            width: 70%; 
            
            display: flex;
            flex-flow: column nowrap;

            align-items: center;
            justify-content: center;
        }

        .login-card h1{
            font-size: 3em;
            text-align: center;
            margin-bottom: 20px;
            color: #000000;
        }

        .login-card label {
            font-size: 1.4em;
            font-weight: 700;
            margin: auto;
            display: block;
            color: #000000;
        }

        .login-card input {
            font-size: 1.4em;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #00000041;
            border-radius: 3px;
        }

        .login-card button {
            font-size: 1.3em;
            width: 100%;
            padding: 20px;
            margin-bottom: 10px;
            background-color: #5a189a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-card button:hover {
            background-color: #000000;
            transition: 0.5s;
        }

        @media screen and (min-width: 798px){
            body{
                box-shadow: inset -100px 0px 1000px rgba(0, 0, 0, 0.849);
            }
            
            main{
                grid-template-columns: auto repeat(3,1fr) auto;
            }
            .login-card {
                transition: ease 1s;
                grid-column: 3/5;
                width: 50%;  
            }
        }

    </style>
</head>
<body>
    <main>
        <section class="login-card">
            <h1>Login</h1>
            <form method="post" action="/login">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" formaction="/login">Entrar</button>
                <button type="submit" formaction="/register">Criar conta</button>
            </form>

        </section>
    </main>
</body>
</html>
